name: Deploy Web (Vercel)

on:
  push:
    branches: [main]

jobs:
  vercel:
    name: Build & Deploy to Vercel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Export Expo web build
        working-directory: apps/mobile
        run: npx expo export --platform web
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Prepare Vercel Build Output
        run: |
          mkdir -p apps/mobile/.vercel/output/static
          cp -r apps/mobile/dist/. apps/mobile/.vercel/output/static/
          cat > apps/mobile/.vercel/output/config.json << 'EOF'
          {"version":3,"routes":[{"handle":"filesystem"},{"src":"/.*","dest":"/index.html"}]}
          EOF

      - name: Deploy to Vercel
        working-directory: apps/mobile
        run: npx vercel@latest --prod --prebuilt --token ${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
