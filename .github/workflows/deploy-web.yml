name: Deploy Web (Vercel)

on:
  push:
    branches: [main]

jobs:
  vercel:
    name: Build & Deploy to Vercel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Export Expo web build
        working-directory: apps/mobile
        run: npx expo export --platform web
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Add Vercel SPA routing config
        run: |
          echo '{"rewrites":[{"source":"/(.*)","destination":"/index.html"}]}' \
            > apps/mobile/dist/vercel.json

      - name: Deploy to Vercel
        working-directory: apps/mobile/dist
        run: npx vercel@latest --prod --token ${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
